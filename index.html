<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reply Helper - Hinglish Reply Suggestions</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #1f2937;
        min-height: 100vh;
        padding: 20px;
        line-height: 1.5;
      }

      .container {
        max-width: 640px;
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        text-align: center;
        margin-bottom: 32px;
        color: #fff;
      }

      header h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }

      header p {
        font-size: 16px;
        opacity: 0.9;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-weight: 600;
        font-size: 14px;
        margin-bottom: 8px;
        color: #374151;
      }

      textarea {
        width: 100%;
        min-height: 130px;
        padding: 14px 16px;
        font-family: inherit;
        font-size: 15px;
        color: #1f2937;
        background: #f9fafb;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        resize: vertical;
        transition: border-color 0.2s, background 0.2s;
      }

      textarea:focus {
        outline: none;
        border-color: #667eea;
        background: #fff;
      }

      .btn {
        width: 100%;
        margin-top: 16px;
        padding: 14px 20px;
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      }

      .btn:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
      }

      .btn:active:not(:disabled) {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .results {
        display: none;
      }

      .results.visible {
        display: block;
      }

      .results h2 {
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 12px;
        padding-left: 4px;
      }

      .reply-card {
        background: #fff;
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        border-left: 4px solid transparent;
        animation: slideIn 0.3s ease-out;
      }

      .reply-card.normal   { border-left-color: #3b82f6; }
      .reply-card.crush    { border-left-color: #ec4899; }
      .reply-card.attitude { border-left-color: #ef4444; }

      .reply-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .reply-tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 4px 10px;
        border-radius: 999px;
      }

      .reply-card.normal   .reply-tag { background: #dbeafe; color: #1e40af; }
      .reply-card.crush    .reply-tag { background: #fce7f3; color: #9d174d; }
      .reply-card.attitude .reply-tag { background: #fee2e2; color: #991b1b; }

      .copy-btn {
        background: transparent;
        border: 1px solid #e5e7eb;
        color: #6b7280;
        font-family: inherit;
        font-size: 12px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .copy-btn:hover {
        background: #f3f4f6;
        color: #1f2937;
        border-color: #d1d5db;
      }

      .copy-btn.copied {
        background: #10b981;
        border-color: #10b981;
        color: #fff;
      }

      .reply-text {
        color: #374151;
        font-size: 15px;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      .empty-hint {
        color: #9ca3af;
        font-size: 13px;
        margin-top: 8px;
      }

      footer {
        text-align: center;
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        margin-top: 24px;
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 480px) {
        body { padding: 12px; }
        .container { padding: 16px 0; }
        header h1 { font-size: 26px; }
        .card { padding: 18px; border-radius: 14px; }
        textarea { min-height: 110px; font-size: 14px; }
        .btn { padding: 13px 18px; font-size: 15px; }
        .reply-card { padding: 16px; }
      }
    </style>

  <body>
    <div class="container">
      <header>
        <h1>Reply Helper</h1>
        <p>Message paste karo, Hinglish reply suggestions pao</p>
      </header>

      <div class="card">
        <label for="message">Received message</label>
        <textarea
          id="message"
          placeholder="Yahan message paste karo..."
          autofocus
        ></textarea>
        <button class="btn" id="getReplyBtn" type="button">Get Reply</button>
        <p class="empty-hint" id="hint"></p>
      </div>

      <div class="results" id="results">
        <h2>Suggested replies</h2>
        <div id="repliesContainer"></div>
      </div>

      <footer>Normal, Crush ya Attitude — apna mood choose karo.</footer>
    </div>

        function hashString(s) {
          let h = 0;
          for (let i = 0; i < s.length; i++) {
            h = ((h << 5) - h) + s.charCodeAt(i);
            h |= 0;
          }
          return Math.abs(h);
        }

        function buildReplies(intent, text) {
          const bank = REPLY_BANK[intent] || REPLY_BANK.general;
          const seed = hashString(text.toLowerCase().trim());
          const pick = function (arr) { return arr[seed % arr.length]; };
          return {
            normal:   pick(bank.normal),
            crush:    pick(bank.crush),
            attitude: pick(bank.attitude)
          };
        }

        const TONE_META = {
          normal:   { label: 'Normal Reply',   icon: '💬' },
          crush:    { label: 'Crush Reply',    icon: '💕' },
          attitude: { label: 'Attitude Reply', icon: '😎' }
        };

        function renderReplies(replies) {
          container.innerHTML = '';
          ['normal', 'crush', 'attitude'].forEach(function (tone) {
            const meta = TONE_META[tone];
            const card = document.createElement('div');
            card.className = 'reply-card ' + tone;

            const header = document.createElement('div');
            header.className = 'reply-header';

            const tag = document.createElement('span');
            tag.className = 'reply-tag';
            tag.textContent = meta.icon + ' ' + meta.label;

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.type = 'button';
            copyBtn.textContent = 'Copy';
            copyBtn.addEventListener('click', function () {
              const text = replies[tone];
              const done = function () {
                copyBtn.classList.add('copied');
                copyBtn.textContent = 'Copied!';
                setTimeout(function () {
                  copyBtn.classList.remove('copied');
                  copyBtn.textContent = 'Copy';
                }, 1500);
              };
              if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(done).catch(function () {
                  fallbackCopy(text); done();
                });
              } else {
                fallbackCopy(text); done();
              }
            });

            header.appendChild(tag);
            header.appendChild(copyBtn);

            const body = document.createElement('p');
            body.className = 'reply-text';
            body.textContent = replies[tone];

            card.appendChild(header);
            card.appendChild(body);
            container.appendChild(card);
          });

          results.classList.add('visible');
        }

        function fallbackCopy(text) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch (e) {}
          document.body.removeChild(ta);
        }

        function handleGetReply() {
          const text = messageEl.value.trim();
          if (!text) {
            hint.textContent = 'Pehle message paste karo.';
            messageEl.focus();
            return;
          }
          hint.textContent = '';
          const intent = detectIntent(text);
          const replies = buildReplies(intent, text);
          renderReplies(replies);
          results.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        btn.addEventListener('click', handleGetReply);
        messageEl.addEventListener('keydown', function (e) {
          if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
            e.preventDefault();
            handleGetReply();
          }
        });
        messageEl.addEventListener('input', function () {
          if (hint.textContent) hint.textContent = '';
        });
      })();
