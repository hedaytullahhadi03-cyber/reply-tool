<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPlan</title>

<style>
body {
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:300px;
  margin:auto;
}

button {
  background:linear-gradient(90deg,#7c3aed,#3b82f6);
  border:none;
  padding:10px;
  color:white;
  border-radius:8px;
  margin-top:10px;
  cursor:pointer;
}

.plan-item {
  background:#0f172a;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
}
</style>

</head>

<body>

<h2>⚡ Smart Planner</h2>

<div class="card">

<select id="time">
  <option>30 min</option>
  <option>1 hour</option>
</select>

<br><br>

<button id="generateBtn">Generate Plan</button>

<div id="planOutput"></div>

</div>

<script>

const btn = document.getElementById("generateBtn");
const output = document.getElementById("planOutput");

btn.addEventListener("click", function() {

  const plans = [
    ["📘 Study 30 min","☕ Break 10 min","📝 Practice 20 min"],
    ["💻 Work 40 min","☕ Break 10 min","📊 Finish Task"],
    ["🔥 Deep Work 25 min","☕ Break 5 min","🎯 Focus Session"]
  ];

  let random = plans[Math.floor(Math.random()*plans.length)];

  output.innerHTML = "";

  random.forEach(item => {
    let div = document.createElement("div");
    div.className = "plan-item";
    div.innerText = item;
    output.appendChild(div);
  });

});

</script>

</body>
</html>
